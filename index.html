<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evobike - Control de Refacciones</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-top: 0; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #555; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; margin-top: 25px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #218838; }
        #mensaje { text-align: center; margin-top: 15px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Registro de Pedidos</h2>
        
        <form id="formularioPedido">
            <label for="modelo">Modelo:</label>
            <select id="modelo">
                <option value="AGUILA">ÁGUILA</option>
            </select>

            <label for="pieza">Refacción a pedir:</label>
            <!-- Aquí agregamos el list="opciones" para conectar con el menú desplegable -->
            <input type="text" id="pieza" list="opcionesRefacciones" placeholder="Escribe o selecciona..." required>
            
            <!-- Esta es la lista de sugerencias. Puedes agregar más líneas <option> después -->
            <datalist id="opcionesRefacciones">
                <option value="MOTOR">
                <option value="TARJETA HALL">
                <option value="TAPA EXTRENA MOTOR">
                <option value="LLANTA DELANTERA">
                <option value="SOPORTE DE COLA DE PATO">
                <option value="FACIA">
                <option value="DISCO DE FRENO">
            </datalist>

            <label for="cantidad">Cantidad:</label>
            <input type="number" id="cantidad" min="1" value="1" required>

            <button type="button" onclick="hacerPedido()">Registrar en Inventario</button>
        </form>

        <p id="mensaje"></p>
    </div>

    <script>
       function hacerPedido() {
            var modelo = document.getElementById('modelo').value;
            var pieza = document.getElementById('pieza').value.toUpperCase();
            var cantidad = document.getElementById('cantidad').value;
            var mensaje = document.getElementById('mensaje');

            if(pieza === "") {
                mensaje.style.color = "red";
                mensaje.innerText = "Por favor, selecciona o escribe el nombre de la pieza.";
                return;
            }

            mensaje.style.color = "blue";
            mensaje.innerText = "Enviando datos a la base de datos...";

            // PEGA TU URL DE GOOGLE AQUÍ ABAJO, ENTRE LAS COMILLAS
            var urlGoogleScript = "https://script.google.com/macros/s/AKfycbyuaJuFHJEL6yoinQjCbo3Yarc-ChE4MruSTbGpmNr-PykdSzrcIVCmh0ywgDjBoUmc5A/exec";

            var payload = {
                modelo: modelo,
                pieza: pieza,
                cantidad: cantidad
            };

            fetch(urlGoogleScript, {
                method: 'POST',
                redirect: 'follow', 
                headers: {
                    "Content-Type": "text/plain;charset=utf-8",
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if(data.estado === "Éxito") {
                    mensaje.style.color = "green";
                    mensaje.innerText = "¡Pedido registrado exitosamente!";
                    document.getElementById('pieza').value = ""; 
                    document.getElementById('cantidad').value = "1";
                } else {
                    mensaje.style.color = "red";
                    mensaje.innerText = "Error del servidor: " + data.mensaje;
                }
            })
            .catch(error => {
                mensaje.style.color = "red";
                mensaje.innerText = "Error de conexión de red.";
                console.error(error); 
            });
        }
    </script>

</body>
</html>
